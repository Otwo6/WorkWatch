<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorkWatch Settings</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="options">
      <h1>WorkWatch Settings</h1>
      <form id="settings-form">
        <label class="toggle">
          <input type="checkbox" id="use-backend">
          <span>Use backend signature updates</span>
        </label>
        <label>
          Backend URL
          <input id="backend-url" type="url" placeholder="http://127.0.0.1:5050">
        </label>
        <button type="submit">Save</button>
      </form>
      <section class="export-panel" aria-labelledby="export-title">
        <h2 id="export-title">Evidence Export</h2>
        <form id="export-form">
          <div class="date-grid">
            <label>
              From
              <input id="export-from" type="date">
            </label>
            <label>
              To
              <input id="export-to" type="date">
            </label>
          </div>
          <button type="submit">Download JSON</button>
        </form>
      </section>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
