<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorkWatch Settings</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="options">
      <h1>WorkWatch Settings</h1>
      <form id="settings-form">
        <label class="toggle">
          <input type="checkbox" id="use-backend">
          <span>Use backend signature updates</span>
        </label>
        <label>
          Backend URL
          <input id="backend-url" type="url" placeholder="http://127.0.0.1:5050">
        </label>
        <button type="submit">Save</button>
      </form>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
